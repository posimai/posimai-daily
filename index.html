<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <meta name="theme-color" content="#0D0D0D" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#F9FAFB" media="(prefers-color-scheme: light)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Posimai Daily">
    <title>Posimai Daily</title>
    
    <!-- Theme & Security Initialization (Prevent FOUC) -->
    <script>
        (function() {
            // Theme setup
            const theme = localStorage.getItem('posimai-daily-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            // APIキー名マイグレーション（旧: posimai_api_key → 新: posimai-daily-apikey）
            const oldKey = localStorage.getItem('posimai_api_key');
            if (oldKey && !localStorage.getItem('posimai-daily-apikey')) {
                localStorage.setItem('posimai-daily-apikey', oldKey);
            }
        })();
    </script>

    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
        :root {
            /* Design Tokens (Standard Posimai Dark) */
            --bg: #0D0D0D;
            --surface: rgba(26, 26, 26, 0.7);
            --surface-bright: rgba(40, 40, 40, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --text: #FFFFFF;
            --text-dim: #999999;
            --accent: #6EE7B7;
            --accent-glow: rgba(110, 231, 183, 0.3);
            --accent-bg: rgba(110, 231, 183, 0.1);
            --radius: 12px; /* Standardize from 8px */
            --font-inter: 'Inter', sans-serif;
            color-scheme: dark;
        }

        [data-theme="light"] {
            --bg: #F9FAFB;
            --surface: rgba(255, 255, 255, 0.7);
            --surface-bright: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.08);
            --text: #111827;
            --text-dim: #6B7280;
            --accent: #059669;
            --accent-glow: rgba(5, 150, 105, 0.2);
            --accent-bg: rgba(5, 150, 105, 0.05);
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-inter);
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .app-container {
            max-width: 440px;
            margin: 0 auto;
            padding: 20px 24px 120px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ── Header ── */
        .app-header {
            text-align: center;
            margin-top: 10px;
        }

        .app-header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        [data-theme="light"] .app-header h1 {
            color: var(--text);
            background: none;
            -webkit-text-fill-color: initial;
        }

        .app-header p {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 2px;
        }

        /* ── Summary / Date ── */
        .date-section {
            text-align: center;
            margin-top: 20px;
        }

        .date-label {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 500;
        }

        .main-title {
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: -0.01em;
        }

        /* ── Audio Visualization Area ── */
        .player-visual {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-top: -10px;
        }

        /* Sparkle Background for Waveform */
        .visual-glow {
            position: absolute;
            width: 200px;
            height: 100px;
            background: radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 70%);
            filter: blur(20px);
            z-index: 0;
            opacity: 0.5;
        }

        .waveform {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 80px;
            z-index: 1;
        }

        .wave-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 4px;
            box-shadow: 0 0 12px var(--accent-glow);
            transition: height 0.1s ease;
        }

        /* ── Controls ── */
        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            position: relative;
        }

        /* Sparkle / Particles around Play Button */
        .particles-container {
            position: absolute;
            width: 140px;
            height: 140px;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 10px var(--accent);
            filter: blur(0.5px);
        }

        @keyframes particle-sparkle {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }

        .play-main {
            width: 84px;
            height: 84px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 40px var(--accent-glow), inset 0 0 15px rgba(255,255,255,0.4);
            transition: transform 0.2s cubic-bezier(.4, 0, .2, 1);
            position: relative;
        }

        .play-main::after {
            content: '';
            position: absolute;
            inset: -12px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            opacity: 0.2;
            animation: pulse-ring 2s linear infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .play-main:active { transform: scale(0.92); }

        .play-inner {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
        }

        /* Waveform Flicker (Sparkle / Glitter) */
        @keyframes wave-sparkle {
            0%, 100% { 
                filter: brightness(1) drop-shadow(0 0 5px var(--accent-glow)); 
                background: var(--accent);
            }
            50% { 
                filter: brightness(2.5) drop-shadow(0 0 20px #fff); 
                background: #fff;
            }
        }

        .wave-bar.sparkle {
            animation: wave-sparkle 0.4s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes wave-glitter {
            0%, 100% { opacity: 0.8; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.1); filter: brightness(2); }
        }

        .wave-bar.glitter {
            animation: wave-glitter 0.3s infinite alternate;
        }

        .secondary-controls {
            display: flex;
            align-items: center;
            gap: 40px;
            color: var(--text-dim);
        }

        .control-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .control-btn:active { transform: scale(0.9); }
        .control-btn:hover { color: var(--text); }

        /* ── Progress ── */
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time { font-size: 11px; color: var(--text-dim); font-weight: 600; font-variant-numeric: tabular-nums; opacity: 0.7; }

        .progress-track {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 32%;
            background: var(--accent);
            border-radius: 2px;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .progress-handle {
            position: absolute;
            left: 32%; top: 50%;
            width: 12px; height: 12px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent-glow);
            border: 2px solid var(--accent);
        }

        /* ── Script Summary Section ── */
        .summary-section {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) * 2);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .summary-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
        .summary-subtitle { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            border-radius: var(--radius);
            color: inherit;        /* <a>タグのデフォルト青を無効化 */
            text-decoration: none; /* 下線も無効化 */
        }

        .summary-item:hover { 
            background: rgba(255,255,255,0.05); 
            border-color: var(--border);
            transform: translateX(4px);
        }

        .item-icon {
            width: 40px; height: 40px;
            background: var(--accent-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            flex-shrink: 0;
            box-shadow: inset 0 0 10px rgba(110,231,183,0.1);
        }

        .item-content { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .item-title { font-size: 14px; font-weight: 600; line-height: 1.3; }
        .item-meta { font-size: 11px; color: var(--text-dim); font-weight: 500; }

        .loading-shimmer {
            height: 60px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ── Bottom Nav ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 90px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.3s;
            opacity: 0.6;
        }

        .nav-btn.active { color: var(--text); opacity: 1; }
        .nav-btn span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .nav-icon-bg {
            width: 48px; height: 32px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
        }

        .nav-btn.active .nav-icon-bg {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* ── Wave Particles ── */
        .wave-particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ── Settings Panel ── */
        .settings-panel {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: 300px;
            background: var(--bg);
            border-left: 1px solid var(--border);
            z-index: 2000;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: -20px 0 40px rgba(0,0,0,0.2);
        }

        .settings-panel.open { transform: translateX(0); }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .settings-header h3 { font-size: 18px; font-weight: 700; }

        .settings-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .settings-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
        }

        .settings-input {
            width: 100%;
            padding: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        .settings-btn {
            padding: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1999;
        }

        .overlay.active { opacity: 1; pointer-events: all; }

        .speaker-btn {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
        }
        .speaker-btn:hover { background: var(--surface-bright); }
        .speaker-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-bg);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <span class="date-label" id="current-date">MONDAY, OCT 28</span>
        <h1 class="main-title" style="font-size: 20px; margin-top: 4px;">Today's Briefing</h1>
    </header>

    <div class="player-visual">
        <div class="visual-glow"></div>
        <div class="waveform" id="waveform">
            <!-- Bars added by JS -->
        </div>
    </div>

    <div class="player-controls">
        <div class="particles-container" id="particles"></div>
        <div class="secondary-controls">
            <button class="control-btn"><i data-lucide="skip-back" style="width:24px;height:24px"></i></button>
            <button class="control-btn"><i data-lucide="rotate-ccw" style="width:24px;height:24px"></i></button>
            <button class="play-main" id="playBtn">
                <div class="play-inner">
                    <i data-lucide="play" id="playIcon" style="fill: #000; width: 32px; height: 32px;"></i>
                </div>
            </button>
            <button class="control-btn"><i data-lucide="rotate-cw" style="width:24px;height:24px"></i></button>
            <button class="control-btn"><i data-lucide="skip-forward" style="width:24px;height:24px"></i></button>
        </div>

        <div class="progress-container">
            <span class="time" id="time-current">—</span>
            <div class="progress-track">
                <div class="progress-bar" id="progress-bar"></div>
                <div class="progress-handle" id="progress-handle"></div>
            </div>
            <span class="time" id="time-total">—</span>
        </div>
        <div id="tts-status" style="text-align:center; font-size:11px; color: var(--text-dim); margin-top:4px; min-height:14px; letter-spacing:0.02em;"></div>
    </div>

    <section class="summary-section">
        <div id="summary-items-list" style="display: flex; flex-direction: column; gap: 10px;">
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
        </div>
    </section>
</div>

<nav class="bottom-nav">
    <button class="nav-btn">
        <div class="nav-icon-bg"><i data-lucide="home" style="width: 20px;"></i></div>
        <span>Daily</span>
    </button>
    <button class="nav-btn active">
        <div class="nav-icon-bg"><i data-lucide="mic" style="width: 20px;"></i></div>
        <span>Brief</span>
    </button>
    <button class="nav-btn" id="echoNav">
        <div class="nav-icon-bg"><i data-lucide="brain" style="width: 20px;"></i></div>
        <span>Echo</span>
    </button>
    <button class="nav-btn" id="settingsNav">
        <div class="nav-icon-bg"><i data-lucide="settings" style="width: 20px;"></i></div>
        <span>Setup</span>
    </button>
</nav>

<div class="overlay" id="overlay"></div>
<aside class="settings-panel" id="settingsPanel">
    <div class="settings-header">
        <h3>設定</h3>
        <button class="control-btn" id="closeSettings"><i data-lucide="x"></i></button>
    </div>

    <div class="settings-section">
        <span class="settings-label">APIキー</span>
        <input type="password" id="apiKeyInput" class="settings-input" placeholder="Posimai API Key">
    </div>

    <div class="settings-section">
        <span class="settings-label">読み上げ話者</span>
        <div id="speakerBtns" style="display:flex; flex-direction:column; gap:6px;">
            <button class="speaker-btn" data-id="1">ずんだもん（明るい）</button>
            <button class="speaker-btn" data-id="3">ずんだもん（甘め）</button>
            <button class="speaker-btn" data-id="0">四国めたん（ノーマル）</button>
            <button class="speaker-btn" data-id="2">四国めたん（甘め）</button>
            <button class="speaker-btn" data-id="8">春日部つむぎ</button>
            <button class="speaker-btn" data-id="13">波音リツ</button>
        </div>
    </div>

    <div class="settings-section">
        <span class="settings-label">読み上げ速度</span>
        <div style="display:flex; gap:8px;">
            <button class="speaker-btn rate-btn" data-rate="0.8">遅め</button>
            <button class="speaker-btn rate-btn" data-rate="1.0">普通</button>
            <button class="speaker-btn rate-btn" data-rate="1.2">速め</button>
            <button class="speaker-btn rate-btn" data-rate="1.5">かなり速め</button>
        </div>
    </div>

    <div class="settings-section">
        <span class="settings-label">使用中の読み上げ音声</span>
        <span id="voiceLabel" style="font-size:12px; color:var(--text-dim);">確認中...</span>
    </div>

    <div class="settings-section">
        <span class="settings-label">テーマ</span>
        <button class="settings-btn" id="themeToggle" style="background: var(--surface); color: var(--text); border: 1px solid var(--border);">
            テーマ切り替え
        </button>
    </div>

    <div style="margin-top: auto;">
        <button class="settings-btn" style="width: 100%;" id="saveSettings">保存</button>
    </div>
</aside>

<script>
    lucide.createIcons();

    function escapeHTML(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Set Date (Uppercase per premium design)
    const options = { weekday: 'long', month: 'short', day: 'numeric' };
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', options).toUpperCase();

    // Waveform setup
    const waveform = document.getElementById('waveform');
    const barCount = 36;
    const bars = [];
    for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'wave-bar';
        bar.style.height = '12px';
        waveform.appendChild(bar);
        bars.push(bar);
    }

    // Particle effect around play button
    const particlesContainer = document.getElementById('particles');
    function createParticle() {
        if (!isPlaying) return;
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = Math.random() * Math.PI * 2;
        const dist = 50 + Math.random() * 60; // More spread
        const size = 2 + Math.random() * 3; // Varied size
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.setProperty('--tx', `${tx}px`);
        p.style.setProperty('--ty', `${ty}px`);
        p.style.left = '50%';
        p.style.top = '50%';
        p.style.animation = `particle-sparkle ${0.6 + Math.random() * 0.4}s cubic-bezier(0, .5, .5, 1) forwards`;
        particlesContainer.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }

    // ── 音声エンジン ──────────────────────────────────────────────────
    // 優先: Synology VOICEVOX API → フォールバック: ブラウザ Web Speech API

    const TTS_API = 'https://posimai-lab.tail72e846.ts.net/brain/api/tts';
    let TTS_SPEAKER = parseInt(localStorage.getItem('posimai-daily-speaker') || '1', 10);
    let TTS_RATE = parseFloat(localStorage.getItem('posimai-daily-rate') || '1.0');

    // Play/Pause State
    const playBtn = document.getElementById('playBtn');
    const playInner = playBtn.querySelector('.play-inner');
    let isPlaying = false;
    let waveInterval;
    let particleInterval;
    let speechQueue = [];
    let currentSpeechIndex = 0;

    // ブラウザ音声を品質優先で選択
    // 優先順: 1.クラウド配信(localService=false) 2.Enhanced/Natural等キーワード 3.任意の日本語音声
    let bestVoice = null;
    function initBestVoice() {
        const voices = window.speechSynthesis.getVoices();
        if (!voices.length) return;
        const ja = voices.filter(v => v.lang.startsWith('ja'));
        if (!ja.length) return;

        // 1. クラウド配信音声（Chrome: Google 日本語 / Edge: Microsoft Nanami Online）
        const online = ja.find(v => !v.localService);
        if (online) { bestVoice = online; return; }

        // 2. 名前にキーワードを含む高品質音声
        for (const kw of ['Natural', 'Enhanced', 'Neural', 'Premium', 'Nanami', 'Online']) {
            const match = ja.find(v => v.name.includes(kw));
            if (match) { bestVoice = match; return; }
        }

        // 3. 最初の日本語音声（フォールバック）
        bestVoice = ja[0];
    }
    window.speechSynthesis.onvoiceschanged = initBestVoice;
    initBestVoice();

    // AudioContext — ユーザージェスチャー時に初期化・resume して Chrome の
    // Autoplay Policy をクリアする。fetch の await 後でも再生可能になる。
    let audioCtx = null;
    let currentSource = null;
    let fetchAbortController = null; // 進行中の fetch をキャンセルするため

    function getAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    function preprocessSpeech(text) {
        if (!text) return '';
        return text
            .replace(/https?:\/\/\S+/g, '')           // URL 除去
            .replace(/[「」『』【】〔〕《》]/g, '')    // 括弧除去
            .replace(/([。！？])([^\s])/g, '$1 $2')    // 句読点後にポーズ
            .replace(/…/g, '。')                       // 省略記号正規化
            .replace(/\s{2,}/g, ' ')
            .trim();
    }

    // VOICEVOX API から WAV を取得して AudioContext で再生
    // getAudioContext() を await より前に呼ぶことで Chrome の制限をパス
    async function fetchAndPlay(text) {
        if (!isPlaying) return; // 停止済みなら即抜ける
        const apiKey = localStorage.getItem('posimai-daily-apikey');
        if (!apiKey) throw new Error('no api key');

        const ctx = getAudioContext(); // ← await より前・同期的に呼ぶ（重要）

        // 前の fetch があればキャンセル
        if (fetchAbortController) fetchAbortController.abort();
        fetchAbortController = new AbortController();

        const res = await fetch(TTS_API, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({ text: preprocessSpeech(text), speaker: TTS_SPEAKER }),
            signal: fetchAbortController.signal
        });

        if (!isPlaying) return; // fetch 完了時点で停止済みなら再生しない
        if (!res.ok) throw new Error(`TTS ${res.status}`);

        const arrayBuffer = await res.arrayBuffer();
        if (!isPlaying) return; // decode 前にも確認

        const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
        if (!isPlaying) return; // decode 後にも確認

        if (currentSource) { try { currentSource.stop(); } catch(e) {} currentSource = null; }

        currentSource = ctx.createBufferSource();
        currentSource.buffer = audioBuffer;
        currentSource.connect(ctx.destination);
        currentSource.onended = () => {
            if (isPlaying) { currentSpeechIndex++; playNext(); }
        };
        currentSource.start(0);
    }

    // ブラウザ TTS (Principal Engine)
    function speakNatural(text) {
        if (!isPlaying) return;
        window.speechSynthesis.cancel(); // Safety cleanup
        
        const utter = new SpeechSynthesisUtterance(preprocessSpeech(text));
        utter.voice = bestVoice;
        utter.rate = TTS_RATE;

        // Update UI progress - estimate based on characters vs total if needed, 
        // but for now we update time-current on 'boundary' or just per article
        utter.onstart = () => {
            updateActiveItem(currentSpeechIndex);
        };

        utter.onend = () => {
            if (isPlaying) {
                currentSpeechIndex++;
                if (currentSpeechIndex < speechQueue.length) {
                    playNext();
                } else {
                    isPlaying = false;
                    stopEffects();
                    updateButtonUI();
                }
            }
        };

        window.speechSynthesis.speak(utter);
    }

    function updateActiveItem(index) {
        document.querySelectorAll('.summary-item').forEach((item, i) => {
            item.style.borderColor = (i === index) ? 'var(--accent)' : 'transparent';
            item.style.background = (i === index) ? 'var(--accent-bg)' : 'rgba(255,255,255,0.02)';
        });
        // 記事番号を表示（時間ではなく「N / 5」形式）
        const total = speechQueue.filter((_, i) => i < speechQueue.length - 1).length; // 締め文を除く
        const displayIndex = Math.min(index + 1, total); // 1始まり
        document.getElementById('time-current').innerText = `${displayIndex}`;
        document.getElementById('time-total').innerText = `/ ${total}`;
        const progress = speechQueue.length > 1 ? (index / (speechQueue.length - 1)) * 100 : 0;
        document.getElementById('progress-bar').style.width = `${progress}%`;
        document.getElementById('progress-handle').style.left = `${progress}%`;
    }

    function skipArticle(dir) {
        window.speechSynthesis.cancel();
        currentSpeechIndex = Math.max(0, Math.min(speechQueue.length - 1, currentSpeechIndex + dir));
        if (isPlaying) playNext();
        else updateActiveItem(currentSpeechIndex);
    }

    function playNext() {
        if (currentSpeechIndex >= speechQueue.length) {
            isPlaying = false;
            stopEffects();
            updateButtonUI();
            return;
        }
        const text = speechQueue[currentSpeechIndex];
        
        // Zundamon Logic: Use only if cached (fire-and-forget check would be too slow, so Natural is default)
        // For now, always use speakNatural for "Instant Quality" per plan Phase 5
        speakNatural(text);
    }

    function updateButtonUI() {
        playInner.innerHTML = `<i data-lucide="${isPlaying ? 'pause' : 'play'}" style="fill: #000; width: 32px; height: 32px;"></i>`;
        lucide.createIcons();
    }

    function stopEffects() {
        clearInterval(particleInterval);
        cancelAnimationFrame(waveRAF);  // RAFアニメーション停止
        if (fetchAbortController) { fetchAbortController.abort(); fetchAbortController = null; }
        if (currentSource) { try { currentSource.stop(); } catch(e) {} currentSource = null; }
        window.speechSynthesis.cancel();
        bars.forEach(bar => { bar.style.height = '12px'; bar.classList.remove('sparkle', 'glitter'); });
    }

    let waveRAF;
    function updateWaveformRAF() {
        if (!isPlaying) return;
        
        bars.forEach((bar, i) => {
            // Sinuous breathing + random jitter
            const time = Date.now() * 0.005;
            const sine = Math.sin(time + i * 0.2) * 10;
            const baseH = 15 + sine + (Math.random() * 30);
            
            bar.style.height = `${baseH}px`;
            
            const rand = Math.random();
            if (rand > 0.92) {
                bar.classList.add('sparkle');
                bar.style.height = `${baseH + 20}px`;
            } else if (rand > 0.8) {
                bar.classList.add('glitter');
            } else {
                bar.classList.remove('sparkle', 'glitter');
            }
        });
        
        waveRAF = requestAnimationFrame(updateWaveformRAF);
    }

    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        document.getElementById('tts-status').textContent = '';
        updateButtonUI();
        
        if (isPlaying) {
            updateWaveformRAF();
            particleInterval = setInterval(createParticle, 40);
            
            // Start or resume audio
            if (speechQueue.length > 0) {
                if (currentSpeechIndex >= speechQueue.length) currentSpeechIndex = 0;
                playNext();
            }
        } else {
            stopEffects();
            cancelAnimationFrame(waveRAF);
        }
    });

    // Feed API から最新 RSS 記事を取得（Feed アプリと同一ソース）
    async function fetchBriefing() {
        const list = document.getElementById('summary-items-list');

        try {
            const response = await fetch('https://posimai-feed.vercel.app/api/feed', {
                cache: 'no-store'
            });

            if (!response.ok) throw new Error(`Feed API ${response.status}`);

            const data = await response.json();

            if (data.articles && Array.isArray(data.articles) && data.articles.length > 0) {
                const articles = data.articles.slice(0, 5);

                // 読み上げキューを構築
                speechQueue = [];
                currentSpeechIndex = 0;
                articles.forEach((a, i) => {
                    const prefix = i === 0 ? "最初のニュースです。" : "続いて。";
                    const body = (a.title || '').substring(0, 60); // タイトルのみ・60字で打ち切り（合成時間短縮）
                    speechQueue.push(`${prefix}${escapeHTML(a.source) || '不明なソース'}より。${body}`);
                });
                speechQueue.push("本日のブリーフィングは以上です。");

                // バックグラウンドウォームアップ + ポーリングで実際の完了を検知
                const _wKey = localStorage.getItem('posimai-daily-apikey') || '';
                if (_wKey) {
                    const statusEl = document.getElementById('tts-status');
                    const warmupUrl = TTS_API.replace(/\/tts$/, '/tts/warmup');
                    const readyUrl  = TTS_API.replace(/\/tts$/, '/tts/ready');
                    const queueSnapshot = [...speechQueue];
                    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_wKey}` };

                    statusEl.textContent = `音声準備中... 0/${queueSnapshot.length}`;

                    // ウォームアップ開始（fire-and-forget）
                    fetch(warmupUrl, {
                        method: 'POST', headers,
                        body: JSON.stringify({ texts: queueSnapshot, speaker: TTS_SPEAKER })
                    }).catch(() => {});

                    // 8秒ごとにキャッシュ完了数を確認
                    let _pollTimer = null;
                    const pollReady = async () => {
                        try {
                            const r = await fetch(readyUrl, {
                                method: 'POST', headers,
                                body: JSON.stringify({ texts: queueSnapshot, speaker: TTS_SPEAKER })
                            });
                            const d = await r.json();
                            if (d.ready) {
                                statusEl.textContent = '音声準備完了';
                                setTimeout(() => { statusEl.textContent = ''; }, 4000);
                            } else {
                                statusEl.textContent = `音声準備中... ${d.cached}/${d.total}`;
                                _pollTimer = setTimeout(pollReady, 20000);
                            }
                        } catch (e) {
                            statusEl.textContent = '';
                        }
                    };
                    _pollTimer = setTimeout(pollReady, 20000);
                }

                const iconMap = { tech: 'code', lifestyle: 'coffee', news: 'newspaper' };

                list.innerHTML = articles.map((a, i) => {
                    const icon = iconMap[a.category] || 'layout-list';
                    const safeTitle = escapeHTML(a.title);
                    const safeSource = escapeHTML(a.source || '不明なソース');
                    const safeUrl = escapeHTML(a.url);
                    const timeAgo = a.publishedAt ? formatTimeAgo(a.publishedAt) : '';

                    return `
                        <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="summary-item" id="news-${i}">
                            <div class="item-icon"><i data-lucide="${icon}"></i></div>
                            <div class="item-content">
                                <span class="item-title">${safeTitle}</span>
                                <span class="item-meta">${safeSource}${timeAgo ? ' • ' + timeAgo : ''}</span>
                            </div>
                            <i data-lucide="chevron-right" style="width: 14px; color: var(--border);"></i>
                        </a>
                    `;
                }).join('');

                lucide.createIcons();
                // 進捗バーを0%にリセット（ハイライトはしない）
                document.getElementById('progress-bar').style.width = '0%';
                document.getElementById('progress-handle').style.left = '0%';
            } else {
                list.innerHTML = '<p style="color:var(--text-dim); font-size:12px; text-align:center; padding: 20px;">記事が見つかりませんでした。</p>';
            }
        } catch (e) {
            console.error('fetchBriefing failed:', e);
            list.innerHTML = '<p style="color:var(--text-dim); font-size:12px; text-align:center; padding: 20px;">フィードの取得に失敗しました。<br>ネットワークを確認してください。</p>';
        }
    }

    function formatTimeAgo(dateStr) {
        const diff = Date.now() - new Date(dateStr).getTime();
        const m = Math.floor(diff / 60000);
        if (m < 60) return `${m}分前`;
        const h = Math.floor(m / 60);
        if (h < 24) return `${h}時間前`;
        return `${Math.floor(h / 24)}日前`;
    }

    fetchBriefing();

    // Settings Panel Logic
    const settingsPanel = document.getElementById('settingsPanel');
    const overlay = document.getElementById('overlay');
    const settingsNav = document.getElementById('settingsNav');
    const closeSettings = document.getElementById('closeSettings');
    const themeToggle = document.getElementById('themeToggle');
    const saveSettings = document.getElementById('saveSettings');
    const apiKeyInput = document.getElementById('apiKeyInput');

    function updateSpeakerUI() {
        document.querySelectorAll('.speaker-btn[data-id]').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.id) === TTS_SPEAKER);
        });
        document.querySelectorAll('.rate-btn').forEach(btn => {
            btn.classList.toggle('active', parseFloat(btn.dataset.rate) === TTS_RATE);
        });
    }

    document.querySelectorAll('.rate-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            TTS_RATE = parseFloat(btn.dataset.rate);
            updateSpeakerUI();
        });
    });

    document.querySelectorAll('.speaker-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            TTS_SPEAKER = parseInt(btn.dataset.id);
            updateSpeakerUI();
        });
    });

    function openSettings() {
        settingsPanel.classList.add('open');
        overlay.classList.add('active');
        apiKeyInput.value = localStorage.getItem('posimai-daily-apikey') || '';
        updateSpeakerUI();
        document.getElementById('voiceLabel').textContent =
            bestVoice ? bestVoice.name : '日本語音声が見つかりません';
    }

    function closeSettingsPanel() {
        settingsPanel.classList.remove('open');
        overlay.classList.remove('active');
    }

    settingsNav.addEventListener('click', openSettings);
    closeSettings.addEventListener('click', closeSettingsPanel);
    overlay.addEventListener('click', closeSettingsPanel);

    themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('posimai-daily-theme', newTheme);
    });

    saveSettings.addEventListener('click', () => {
        const newKey = apiKeyInput.value.trim();
        if (newKey) localStorage.setItem('posimai-daily-apikey', newKey);
        else localStorage.removeItem('posimai-daily-apikey');
        localStorage.setItem('posimai-daily-speaker', String(TTS_SPEAKER));
        localStorage.setItem('posimai-daily-rate', String(TTS_RATE));
        closeSettingsPanel();
        fetchBriefing();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeSettingsPanel();
    });

    // Playback Button Listeners
    document.querySelector('[data-lucide="skip-back"]').parentElement.addEventListener('click', () => skipArticle(-1));
    document.querySelector('[data-lucide="skip-forward"]').parentElement.addEventListener('click', () => skipArticle(1));
    // rotate-ccw = 現在の記事を最初から再再生、rotate-cw = 次の記事へ（skip-forward と同等）
    document.querySelector('[data-lucide="rotate-ccw"]').parentElement.addEventListener('click', () => {
        if (!isPlaying) return;
        window.speechSynthesis.cancel();
        playNext(); // 同じ index で再再生
    });
    document.querySelector('[data-lucide="rotate-cw"]').parentElement.addEventListener('click', () => skipArticle(1));

    // Progress Track Interaction
    document.querySelector('.progress-track').addEventListener('click', (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const pct = x / rect.width;
        const index = Math.floor(pct * speechQueue.length);
        currentSpeechIndex = Math.max(0, Math.min(speechQueue.length - 1, index));
        skipArticle(0); // Jump to current index
    });

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed:', err));
        });
    }
</script>
